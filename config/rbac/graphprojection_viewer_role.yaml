# This rule is not used by the project gamera itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to gamera.gamera.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: gamera
    app.kubernetes.io/managed-by: kustomize
  name: graphprojection-viewer-role
rules:
- apiGroups:
  - gamera.gamera.io
  resources:
  - graphprojections
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - gamera.gamera.io
  resources:
  - graphprojections/status
  verbs:
  - get
