# This rule is not used by the project astron itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the astron.astron.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: astron
    app.kubernetes.io/managed-by: kustomize
  name: graphprojection-editor-role
rules:
- apiGroups:
  - astron.astron.io
  resources:
  - graphprojections
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - astron.astron.io
  resources:
  - graphprojections/status
  verbs:
  - get
