apiVersion: astron.astron.io/v1alpha1
kind: GraphProjection
metadata:
  labels:
    app.kubernetes.io/name: astron
    app.kubernetes.io/managed-by: kustomize
  name: graphprojection-sample
spec:
  # The Neo4J connection is configured once on the controller (via flags,
  # environment variables, or a mounted configuration file), not per
  # projection.
  resyncInterval: 5m
  scope:
    # Set ownNamespaceOnly to capture only resources in this resource's own
    # namespace (ignores the namespaces field and cluster-scoped resources).
    ownNamespaceOnly: false
    # Leave namespaces empty to watch the whole cluster.
    namespaces:
      - default
    resources:
      - group: apps
        version: v1
        kind: Deployment
      - group: apps
        version: v1
        kind: StatefulSet
      - group: apps
        version: v1
        kind: DaemonSet
      - version: v1
        kind: Pod
      - version: v1
        kind: Service
      - version: v1
        kind: ServiceAccount
      - version: v1
        kind: ConfigMap
      - version: v1
        kind: Secret
      - version: v1
        kind: PersistentVolumeClaim
    # Capture CustomResourceDefinitions as graph nodes. When enabled, a DEFINES
    # edge is created from each captured CRD to every captured resource that is
    # an instance of it (the instance kind must also appear under resources).
    crds:
      # include: true captures all CRDs in the cluster. Alternatively, set names
      # to capture only specific CRDs (names implies inclusion):
      #   names:
      #     - widgets.example.com
      include: true
  relationships:
    - name: workload-owns-pod
      type: OWNS
      strategy: OwnerReference
      from:
        group: apps
        version: v1
        kind: Deployment
      to:
        version: v1
        kind: Pod
    - name: service-selects-pod
      type: SELECTS
      strategy: LabelSelector
      from:
        version: v1
        kind: Service
      to:
        version: v1
        kind: Pod
    - name: configmap-mounts-pod
      type: MOUNTS
      strategy: VolumeMount
      from:
        version: v1
        kind: ConfigMap
      to:
        version: v1
        kind: Pod
    - name: pvc-mounts-pod
      type: MOUNTS
      strategy: VolumeMount
      from:
        version: v1
        kind: PersistentVolumeClaim
      to:
        version: v1
        kind: Pod
    - name: serviceaccount-runs-pod
      type: RUNS
      strategy: ServiceAccount
      from:
        version: v1
        kind: ServiceAccount
      to:
        version: v1
        kind: Pod
  # Optionally enable GraphRAG: render each resource (and its relationships) into
  # a natural-language card, embed it, and store the vector on the node so the
  # read API can serve semantic (vector + graph) retrieval.
  graphRAG:
    enabled: false
    embedding:
      # provider: fake | openai | azure | ollama
      provider: openai
      model: text-embedding-3-small
      # dimensions optionally pins the vector length (model-dependent).
      dimensions: 1536
      # baseURL is required for azure/ollama and optional for openai.
      # baseURL: https://my-resource.openai.azure.com
      authSecretRef:
        name: astron-embeddings
        # apiKeyKey defaults to "apiKey".
        # apiKeyKey: apiKey
    # include controls which node properties feed the embedded card.
    include:
      labels: true
      annotations: false
    vectorIndex:
      # similarity: cosine | euclidean
      similarity: cosine
    # chat optionally enables natural-language answering (/rag/answer) and
    # text-to-Cypher (/rag/query, and the query_cluster MCP tool).
    chat:
      enabled: false
      provider: openai
      model: gpt-4o-mini
      # baseURL: https://my-resource.openai.azure.com
      authSecretRef:
        name: astron-chat
        # apiKeyKey: apiKey
