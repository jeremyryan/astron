# Default values for the Astron operator chart.

# -- Number of operator replicas. Leader election ensures a single active
# controller, so >1 only provides standby redundancy.
replicaCount: 1

image:
  # -- Operator container image repository.
  repository: ghcr.io/project-astron/astron
  # -- Image pull policy.
  pullPolicy: IfNotPresent
  # -- Image tag. Defaults to the chart appVersion when empty.
  tag: ""

# -- Image pull secrets for private registries.
imagePullSecrets: []
# -- Override the chart name used in resource names.
nameOverride: ""
# -- Override the fully qualified release name.
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount for the operator.
  create: true
  # -- Annotations to add to the ServiceAccount.
  annotations: {}
  # -- ServiceAccount name. Generated from the release when empty.
  name: ""

rbac:
  # -- Create the ClusterRole/Role and bindings the operator needs.
  create: true

crds:
  # -- Install the GraphProjection CRD with this chart. The CRD is annotated
  # with helm.sh/resource-policy: keep so it survives uninstall.
  install: true

controller:
  # -- Enable leader election (recommended).
  leaderElection: true
  # Health probe endpoint.
  healthProbeBindAddress: ":8081"
  metrics:
    # -- Expose the controller metrics endpoint.
    enabled: true
    # -- Bind address for metrics. ":8443" (HTTPS) or ":8080" (HTTP).
    bindAddress: ":8443"
    # -- Serve metrics over HTTPS with authn/authz.
    secure: true
  api:
    # -- Enable the read API and embedded web UI server.
    enabled: true
    # -- Bind address for the API/UI server.
    bindAddress: ":8082"
  # -- Extra args passed to the manager.
  extraArgs: []
  # -- Resource requests/limits for the manager container.
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 10m
      memory: 64Mi
  # -- Pod-level security context.
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  # -- Container-level security context.
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}

service:
  api:
    # -- Service type for the API/UI server.
    type: ClusterIP
    # -- Service port for the API/UI server.
    port: 8082
  metrics:
    # -- Service type for the metrics endpoint.
    type: ClusterIP
    # -- Service port for the metrics endpoint.
    port: 8443

# Optionally expose the API/UI server through a Gateway API HTTPRoute. Requires
# the Gateway API CRDs (gateway.networking.k8s.io/v1) and a running Gateway in
# the cluster. The route targets the API Service, so controller.api.enabled
# must also be true.
httpRoute:
  # -- Create an HTTPRoute for the API/UI server.
  enabled: false
  # -- API version for the HTTPRoute resource.
  apiVersion: gateway.networking.k8s.io/v1
  # -- Extra annotations to add to the HTTPRoute.
  annotations: {}
  # -- Extra labels to add to the HTTPRoute.
  labels: {}
  # -- Hostnames the route matches. Empty matches all hostnames.
  hostnames: []
  # -- parentRefs binding the route to one or more Gateways/listeners.
  parentRefs:
    - name: ""
      # namespace: ""
      # sectionName: ""
      # port: 80
  # -- Route matching rules. Defaults to all paths ("/") routed to the API
  # Service. Backend refs are filled in automatically when omitted.
  matches:
    - path:
        type: PathPrefix
        value: /
  # -- Optional filters applied to the default rule (e.g. header modifiers).
  filters: []
  # -- Fully override the rules list. When set, matches/filters above are
  # ignored and these rules are rendered verbatim.
  rules: []

# Connection to Neo4J used to materialize the graph. These values feed the
# credentials Secret and the optional default GraphProjection.
connection:
  # -- Bolt/neo4j URI of the target database. Leave empty to auto-derive the
  # in-cluster address of the bundled Neo4J when neo4j.enabled is true.
  uri: ""
  # -- Target Neo4J database name.
  database: "neo4j"
  # -- Username for the credentials Secret created by this chart.
  username: "neo4j"
  # -- Password for the credentials Secret. When neo4j.enabled is true and this
  # is empty, the bundled Neo4J password (neo4j.neo4j.password) is used so the
  # two stay in sync.
  password: ""
  # -- Use an existing Secret for credentials instead of creating one. When set,
  # username/password above are ignored.
  existingSecret: ""
  # -- Key in the credentials Secret holding the username.
  usernameKey: "username"
  # -- Key in the credentials Secret holding the password.
  passwordKey: "password"

# Optionally create a default GraphProjection on install.
defaultProjection:
  # -- Create a GraphProjection resource pointing at the configured Neo4J.
  enabled: true
  # -- Name of the default GraphProjection.
  name: "default"
  # -- resyncInterval for the default projection.
  resyncInterval: "5m"
  # -- Restrict the default projection to its own (the release) namespace. When
  # true, only namespaced resources in the release namespace are captured;
  # cluster-scoped resources and scope.namespaces are ignored. Set to false to
  # project across the cluster (subject to scope below).
  ownNamespaceOnly: true
  # -- Additional scope for the default projection (namespaces/resources/
  # labelSelector/crds), merged with ownNamespaceOnly above. Empty captures the
  # built-in default resource set. Note: namespaces is ignored while
  # ownNamespaceOnly is true. To also capture CustomResourceDefinitions as nodes
  # (and DEFINES edges to their captured instances), set e.g.
  # scope: { crds: { include: true } }.
  scope: {}
  # -- Relationship rules used to derive edges between resource nodes.
  relationships:
    - name: replicaset-owns-pod
      type: OWNS
      strategy: OwnerReference
      from: { group: apps, version: v1, kind: ReplicaSet }
      to: { version: v1, kind: Pod }
    - name: deployment-owns-replicaset
      type: OWNS
      strategy: OwnerReference
      from: { group: apps, version: v1, kind: Deployment }
      to: { group: apps, version: v1, kind: ReplicaSet }
    - name: statefulset-owns-pod
      type: OWNS
      strategy: OwnerReference
      from: { group: apps, version: v1, kind: StatefulSet }
      to: { version: v1, kind: Pod }
    - name: daemonset-owns-pod
      type: OWNS
      strategy: OwnerReference
      from: { group: apps, version: v1, kind: DaemonSet }
      to: { version: v1, kind: Pod }
    - name: job-owns-pod
      type: OWNS
      strategy: OwnerReference
      from: { group: batch, version: v1, kind: Job }
      to: { version: v1, kind: Pod }
    - name: cronjob-owns-job
      type: OWNS
      strategy: OwnerReference
      from: { group: batch, version: v1, kind: CronJob }
      to: { group: batch, version: v1, kind: Job }
    - name: service-selects-pod
      type: SELECTS
      strategy: LabelSelector
      from: { version: v1, kind: Service }
      to: { version: v1, kind: Pod }
    - name: configmap-mounts-pod
      type: MOUNTS
      strategy: VolumeMount
      from: { version: v1, kind: ConfigMap }
      to: { version: v1, kind: Pod }
    - name: secret-mounts-pod
      type: MOUNTS
      strategy: VolumeMount
      from: { version: v1, kind: Secret }
      to: { version: v1, kind: Pod }
    - name: pvc-mounts-pod
      type: MOUNTS
      strategy: VolumeMount
      from: { version: v1, kind: PersistentVolumeClaim }
      to: { version: v1, kind: Pod }
    - name: pv-binds-pvc
      type: BINDS
      strategy: ClaimRef
      from: { version: v1, kind: PersistentVolume }
      to: { version: v1, kind: PersistentVolumeClaim }
    - name: ingress-routes-service
      type: ROUTES
      strategy: ServiceBackend
      from: { group: networking.k8s.io, version: v1, kind: Ingress }
      to: { version: v1, kind: Service }
    - name: httproute-routes-service
      type: ROUTES
      strategy: ServiceBackend
      from: { group: gateway.networking.k8s.io, version: v1, kind: HTTPRoute }
      to: { version: v1, kind: Service }
    - name: role-grants-rolebinding
      type: GRANTS
      strategy: RoleRef
      from: { group: rbac.authorization.k8s.io, version: v1, kind: Role }
      to: { group: rbac.authorization.k8s.io, version: v1, kind: RoleBinding }
    - name: clusterrole-grants-clusterrolebinding
      type: GRANTS
      strategy: RoleRef
      from: { group: rbac.authorization.k8s.io, version: v1, kind: ClusterRole }
      to: { group: rbac.authorization.k8s.io, version: v1, kind: ClusterRoleBinding }
    - name: clusterrole-grants-rolebinding
      type: GRANTS
      strategy: RoleRef
      from: { group: rbac.authorization.k8s.io, version: v1, kind: ClusterRole }
      to: { group: rbac.authorization.k8s.io, version: v1, kind: RoleBinding }
    - name: rolebinding-binds-serviceaccount
      type: BINDS
      strategy: BindingSubject
      from: { group: rbac.authorization.k8s.io, version: v1, kind: RoleBinding }
      to: { version: v1, kind: ServiceAccount }
    - name: clusterrolebinding-binds-serviceaccount
      type: BINDS
      strategy: BindingSubject
      from: { group: rbac.authorization.k8s.io, version: v1, kind: ClusterRoleBinding }
      to: { version: v1, kind: ServiceAccount }
  # -- GraphRAG (semantic retrieval) configuration for the default projection.
  # When enabled, each resource node is rendered into a natural-language card,
  # embedded, and stored on the node so the read API can serve vector + graph
  # retrieval. Requires an embedding provider (and, for openai/azure, an API key
  # Secret referenced by embedding.authSecretRef).
  graphRAG:
    # -- Enable embedding generation and semantic retrieval.
    enabled: false
    embedding:
      # -- Embedding backend: fake | openai | azure | ollama.
      provider: openai
      # -- Embedding model name.
      model: text-embedding-3-small
      # -- Optional fixed vector length (model-dependent; 0 = model default).
      dimensions: 1536
      # -- API base override (required for azure/ollama).
      baseURL: ""
      # -- Secret holding the provider API key. Omit for fake/ollama.
      authSecretRef:
        name: astron-embeddings
        apiKeyKey: apiKey
    include:
      # -- Include resource labels in the embedded card.
      labels: true
      # -- Include resource annotations in the embedded card.
      annotations: false
    vectorIndex:
      # -- Vector similarity function: cosine | euclidean.
      similarity: cosine
    chat:
      # -- Enable natural-language answering (/rag/answer) and text-to-Cypher
      # (/rag/query, query_cluster MCP tool). Requires a chat model.
      enabled: false
      # -- Chat backend: fake | openai | azure | ollama.
      provider: openai
      # -- Chat model name.
      model: gpt-4o-mini
      # -- API base override (required for azure/ollama).
      baseURL: ""
      # -- Secret holding the chat provider API key. Omit for fake/ollama.
      authSecretRef:
        name: astron-chat
        apiKeyKey: apiKey

# Default Views (saved filter sets) created on deploy for the default
# projection. Each view hides the resource kinds not relevant to it (the filter
# model is a hide-list). Set defaultViews.enabled=false to skip creating them.
defaultViews:
  # -- Create the built-in GraphViews (Compute / Persistence / Networking).
  enabled: true
  # -- The views to create. projectionRef is set to defaultProjection.name.
  views:
    - name: compute
      displayName: Compute
      description: Pods and the workload controllers (Deployments, ReplicaSets, StatefulSets, DaemonSets, Jobs, CronJobs) that manage them.
      filters:
        groupByNamespace: true
        # Allow-list: only these kinds are shown, so newly-captured kinds do not
        # leak into the view.
        kindMode: show
        visibleKinds:
          - Pod
          - Deployment
          - ReplicaSet
          - StatefulSet
          - DaemonSet
          - Job
          - CronJob
    - name: persistence
      displayName: Persistence
      description: Pods together with the PersistentVolumeClaims and PersistentVolumes attached to them.
      filters:
        groupByNamespace: true
        kindMode: show
        visibleKinds:
          - Pod
          - PersistentVolumeClaim
          - PersistentVolume
    - name: networking
      displayName: Networking
      description: Pods together with the Services, Ingresses and HTTPRoutes that expose them to network traffic.
      filters:
        groupByNamespace: true
        kindMode: show
        visibleKinds:
          - Pod
          - Service
          - Ingress
          - HTTPRoute
          - Gateway
    - name: access-control
      displayName: Access control
      description: RBAC resources (Roles, ClusterRoles, their bindings) and the ServiceAccounts they grant permissions to.
      filters:
        groupByNamespace: true
        kindMode: show
        visibleKinds:
          - Pod
          - ServiceAccount
          - Role
          - ClusterRole
          - RoleBinding
          - ClusterRoleBinding

# Bundled Neo4J subchart (https://helm.neo4j.com/neo4j).
# Set neo4j.enabled to false to use an existing/external Neo4J instead; then
# configure connection.uri and connection.existingSecret (or username/password).
neo4j:
  # -- Deploy the bundled Neo4J subchart. Set to false to use an existing one.
  enabled: true
  # The keys below are passed to the official Neo4J chart.
  neo4j:
    # -- Name of the bundled Neo4J instance (also its in-cluster service name).
    name: astron-neo4j
    # -- Password for the bundled Neo4J 'neo4j' user. CHANGE THIS.
    password: "change-me-please"
    # -- Neo4J edition.
    edition: community
  # -- Disable cluster DNS lookups that require elevated permissions.
  disableLookups: true
  volumes:
    data:
      # -- Storage source for the data volume.
      mode: defaultStorageClass
