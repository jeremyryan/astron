apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "astron.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "astron.labels" . | nindent 4 }}
    control-plane: controller-manager
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "astron.selectorLabels" . | nindent 6 }}
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.controller.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "astron.selectorLabels" . | nindent 8 }}
        control-plane: controller-manager
        {{- with .Values.controller.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "astron.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      securityContext:
        {{- toYaml .Values.controller.podSecurityContext | nindent 8 }}
      containers:
        - name: manager
          image: {{ include "astron.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /manager
          args:
            - --health-probe-bind-address={{ .Values.controller.healthProbeBindAddress }}
            {{- if .Values.controller.leaderElection }}
            - --leader-elect
            {{- end }}
            {{- if .Values.controller.metrics.enabled }}
            - --metrics-bind-address={{ .Values.controller.metrics.bindAddress }}
            - --metrics-secure={{ .Values.controller.metrics.secure }}
            {{- else }}
            - --metrics-bind-address=0
            {{- end }}
            {{- if .Values.controller.api.enabled }}
            - --api-bind-address={{ .Values.controller.api.bindAddress }}
            {{- else }}
            - --api-bind-address=0
            {{- end }}
            {{- with .Values.controller.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: health
              containerPort: {{ .Values.controller.healthProbeBindAddress | trimPrefix ":" | int }}
              protocol: TCP
            {{- if .Values.controller.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.controller.metrics.bindAddress | trimPrefix ":" | int }}
              protocol: TCP
            {{- end }}
            {{- if .Values.controller.api.enabled }}
            - name: api
              containerPort: {{ .Values.controller.api.bindAddress | trimPrefix ":" | int }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.controller.securityContext | nindent 12 }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
