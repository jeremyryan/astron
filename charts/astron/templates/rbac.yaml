{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "astron.fullname" . }}-manager
  labels:
    {{- include "astron.labels" . | nindent 4 }}
rules:
# Read any resource in the cluster so the dynamic watchers can project them.
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]
# GraphProjection CRD.
- apiGroups: ["astron.astron.io"]
  resources: ["graphprojections"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: ["astron.astron.io"]
  resources: ["graphprojections/status"]
  verbs: ["get", "patch", "update"]
- apiGroups: ["astron.astron.io"]
  resources: ["graphprojections/finalizers"]
  verbs: ["update"]
# GraphView CRD (saved filter sets) managed via the read/write API.
- apiGroups: ["astron.astron.io"]
  resources: ["graphviews"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: ["astron.astron.io"]
  resources: ["graphviews/status"]
  verbs: ["get", "patch", "update"]
{{- if .Values.controller.metrics.secure }}
---
# Allow the metrics endpoint to authenticate/authorize scrapers.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "astron.fullname" . }}-metrics-auth
  labels:
    {{- include "astron.labels" . | nindent 4 }}
rules:
- apiGroups: ["authentication.k8s.io"]
  resources: ["tokenreviews"]
  verbs: ["create"]
- apiGroups: ["authorization.k8s.io"]
  resources: ["subjectaccessreviews"]
  verbs: ["create"]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "astron.fullname" . }}-manager
  labels:
    {{- include "astron.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "astron.fullname" . }}-manager
subjects:
- kind: ServiceAccount
  name: {{ include "astron.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- if .Values.controller.metrics.secure }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "astron.fullname" . }}-metrics-auth
  labels:
    {{- include "astron.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "astron.fullname" . }}-metrics-auth
subjects:
- kind: ServiceAccount
  name: {{ include "astron.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.controller.leaderElection }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "astron.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "astron.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "astron.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "astron.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "astron.fullname" . }}-leader-election
subjects:
- kind: ServiceAccount
  name: {{ include "astron.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
