{{- if .Values.projectionDefaults.enabled }}
# Default configuration for new GraphProjections. The `spec` key holds a
# partial GraphProjection spec that tooling can merge into generated
# manifests, e.g.:
#
#   astron projections generate --spec-from-configmap {{ include "astron.projectionDefaultsName" . }} ...
#
# The Neo4J connection is configured once on the controller (see the
# Deployment's ASTRON_NEO4J_* environment variables), so projections carry no
# connection details; populate projectionDefaults.extraSpec with any shared
# settings new projections should start from (e.g. resyncInterval or graphRAG
# defaults).
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "astron.projectionDefaultsName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "astron.labels" . | nindent 4 }}
data:
  spec: |
    {{- with .Values.projectionDefaults.extraSpec }}
    {{- toYaml . | nindent 4 }}
    {{- else }}
    {}
    {{- end }}
{{- end }}
