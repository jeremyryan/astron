{{- if .Values.defaultProjection.enabled }}
{{- $uri := include "astron.neo4jUri" . }}
{{- if not $uri }}
{{- fail "defaultProjection.enabled is true but no Neo4J URI is available: set connection.uri, or enable the bundled Neo4J (neo4j.enabled=true)." }}
{{- end }}
apiVersion: astron.astron.io/v1alpha1
kind: GraphProjection
metadata:
  name: {{ .Values.defaultProjection.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "astron.labels" . | nindent 4 }}
  {{- if .Values.neo4j.enabled }}
  annotations:
    # Ensure the CRD and operator are in place before the sample is applied.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
  {{- end }}
spec:
  neo4j:
    uri: {{ $uri | quote }}
    database: {{ .Values.connection.database | quote }}
    authSecretRef:
      name: {{ include "astron.credentialsSecretName" . }}
      namespace: {{ .Release.Namespace }}
      usernameKey: {{ .Values.connection.usernameKey | quote }}
      passwordKey: {{ .Values.connection.passwordKey | quote }}
  {{- with .Values.defaultProjection.resyncInterval }}
  resyncInterval: {{ . | quote }}
  {{- end }}
  scope:
    ownNamespaceOnly: {{ .Values.defaultProjection.ownNamespaceOnly }}
    {{- with .Values.defaultProjection.scope }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.defaultProjection.relationships }}
  relationships:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.defaultProjection.graphRAG }}
  {{- if .enabled }}
  graphRAG:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
{{- end }}
