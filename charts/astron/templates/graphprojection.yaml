{{- if .Values.defaultProjection.enabled }}
apiVersion: astron.astron.io/v1alpha1
kind: GraphProjection
metadata:
  name: {{ .Values.defaultProjection.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "astron.labels" . | nindent 4 }}
  {{- if .Values.neo4j.enabled }}
  annotations:
    # Ensure the CRD and operator are in place before the sample is applied.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
  {{- end }}
spec:
  {{- with .Values.defaultProjection.resyncInterval }}
  resyncInterval: {{ . | quote }}
  {{- end }}
  scope:
    ownNamespaceOnly: {{ .Values.defaultProjection.ownNamespaceOnly }}
    {{- with .Values.defaultProjection.scope }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.defaultProjection.relationships }}
  relationships:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.defaultProjection.graphRAG }}
  {{- if .enabled }}
  graphRAG:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
{{- end }}
