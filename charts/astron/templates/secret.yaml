{{- if not .Values.connection.existingSecret }}
{{- $password := include "astron.neo4jPassword" . }}
{{- if not $password }}
{{- fail "A Neo4J password is required: set connection.password, or neo4j.neo4j.password when neo4j.enabled=true, or provide connection.existingSecret." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "astron.credentialsSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "astron.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.connection.usernameKey }}: {{ .Values.connection.username | quote }}
  {{ .Values.connection.passwordKey }}: {{ $password | quote }}
{{- end }}
