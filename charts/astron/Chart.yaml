apiVersion: v2
name: astron
description: |
  Astron - a Kubernetes operator that projects cluster resources and
  their relationships into a Neo4J graph, with a web UI to explore them.
type: application
version: 0.2.0
appVersion: "v0.2.0"
keywords:
  - kubernetes
  - operator
  - neo4j
  - graph
  - visualization
home: https://github.com/project-astron/astron
sources:
  - https://github.com/project-astron/astron
maintainers:
  - name: Astron
dependencies:
  - name: neo4j
    version: "5.26.0"
    repository: "https://helm.neo4j.com/neo4j"
    condition: neo4j.enabled
    alias: neo4j
