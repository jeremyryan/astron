# Development overrides used by the Skaffold dev loop (skaffold.yaml).
# image.repository / image.tag are injected by Skaffold from the freshly built
# image; only non-image dev settings belong here.

controller:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Bundled Neo4J for local development.
neo4j:
  enabled: true
  neo4j:
    password: "astron-dev-password"
  resources:
    cpu: 500m
    memory: 1Gi

# Create a default GraphProjection on deploy. By default it is scoped to the
# release namespace (ownNamespaceOnly: true). Set ownNamespaceOnly: false to
# project across the whole cluster during development.
defaultProjection:
  enabled: false
  ownNamespaceOnly: false


httpRoute:
  enabled: true
  hostnames:
    - astron-192-168-1-190.nip.io
  parentRefs:
    - name: "traefik-gateway"
      namespace: "kube-system"
