              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of GraphView.
            properties:
              description:
                description: description is an optional human-readable description
                  of the view.
                type: string
              displayName:
                description: |-
                  displayName is a human-friendly name shown in the UI. When empty, the
                  resource name is used.
                type: string
              filters:
                description: |-
                  filters defines the set of filters this view applies to the projected
                  graph. All fields are optional; an empty filters block shows everything.
                properties:
                  groupByNamespace:
                    description: |-
                      groupByNamespace groups resources into compound nodes by namespace when
                      true.
                    type: boolean
                  hiddenKinds:
                    description: hiddenKinds lists resource kinds to hide (e.g. "ConfigMap",
                      "Secret").
                    items:
                      type: string
                    type: array
                  hiddenNamespaces:
                    description: hiddenNamespaces lists namespaces to hide.
                    items:
                      type: string
                    type: array
                  labelFilters:
                    description: |-
                      labelFilters restricts displayed nodes to those matching the given label
                      key/value pairs, combined according to labelMode.
                    items:
                      description: |-
                        LabelFilter is a single label key/value constraint. An empty value matches any
                        value for the given key (a presence check).
                      properties:
                        key:
                          description: key is the label key to match.
                          minLength: 1
                          type: string
                        value:
                          description: value is the label value to match. When empty,
                            any value matches.
                          type: string
                      required:
                      - key
                      type: object
                    type: array
                  labelMode:
                    default: any
                    description: |-
                      labelMode controls how labelFilters are combined: "any" (OR) or "all"
                      (AND).
                    enum:
                    - any
                    - all
                    type: string
                  maxDistance:
                    description: |-
                      maxDistance limits visible nodes to those within this many hops of the
                      selected node. When omitted, all connections are shown.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              projectionRef:
                description: projectionRef selects the GraphProjection this view filters.
                properties:
                  name:
                    description: name is the name of the GraphProjection.
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      namespace is the namespace of the GraphProjection. When omitted, the
                      namespace of the GraphView resource is used.
                    type: string
                required:
                - name
                type: object
            required:
            - projectionRef
            type: object
          status:
            description: status defines the observed state of GraphView.
            properties:
              conditions:
                description: conditions represent the current state of the GraphView
