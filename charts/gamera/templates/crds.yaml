apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
    helm.sh/resource-policy: keep
  name: graphviews.gamera.gamera.io
spec:
  group: gamera.gamera.io
  names:
    kind: GraphView
    listKind: GraphViewList
    plural: graphviews
    singular: graphview
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.projectionRef.name
      name: Projection
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: GraphView is the Schema for the graphviews API.
