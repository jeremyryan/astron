{{- if .Values.httpRoute.enabled }}
{{- if not .Values.controller.api.enabled }}
{{- fail "httpRoute.enabled requires controller.api.enabled to be true (the HTTPRoute targets the API/UI Service)." }}
{{- end }}
apiVersion: {{ .Values.httpRoute.apiVersion }}
kind: HTTPRoute
metadata:
  name: {{ include "gamera.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gamera.labels" . | nindent 4 }}
    {{- with .Values.httpRoute.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .Values.httpRoute.parentRefs | nindent 4 }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- if .Values.httpRoute.rules }}
    {{- toYaml .Values.httpRoute.rules | nindent 4 }}
    {{- else }}
    - matches:
        {{- toYaml .Values.httpRoute.matches | nindent 8 }}
      {{- with .Values.httpRoute.filters }}
      filters:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      backendRefs:
        - name: {{ include "gamera.fullname" . }}-api
          port: {{ .Values.service.api.port }}
    {{- end }}
{{- end }}
