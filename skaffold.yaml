apiVersion: skaffold/v4beta12
kind: Config
metadata:
  name: astron

build:
  local:
    # Push to the local registry instead of loading into a daemon, so the k3s
    # node can pull the image. localhost:5000 is treated as an insecure (HTTP)
    # registry by both Docker and containerd by default.
    push: true
    concurrency: 1
    # Required for the Dockerfile's RUN --mount=type=cache build cache mounts.
    useBuildkit: true
  tagPolicy:
    # Content-based tags keep redeploys stable and cache-friendly.
    inputDigest: {}
  artifacts:
    - image: localhost:5000/astron
      docker:
        # Build context is the repo root; the Dockerfile builds the web UI
        # (node stage) and then the Go manager binary.
        dockerfile: Dockerfile

manifests:
  helm:
    releases:
      - name: astron
        chartPath: charts/astron
        namespace: astron
        createNamespace: true
        valuesFiles:
          - charts/astron/values-dev.yaml
        # Inject the freshly built, digest-pinned image into the chart. The
        # variable suffix is the artifact image with non-alphanumerics -> '_'.
        setValueTemplates:
          image.repository: "{{.IMAGE_REPO_localhost_5000_astron}}"
          image.tag: "{{.IMAGE_TAG_localhost_5000_astron}}@{{.IMAGE_DIGEST_localhost_5000_astron}}"
        setValues:
          # Unique digest-pinned refs each build, so IfNotPresent is correct.
          image.pullPolicy: IfNotPresent

deploy:
  helm: {}
  # Neo4J's StatefulSet can take a while to become ready on first start.
  statusCheckDeadlineSeconds: 300

portForward:
  - resourceType: service
    resourceName: astron-api
    namespace: astron
    port: 8082
    localPort: 8082
